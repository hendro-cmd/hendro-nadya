<div class="page-card">
  <div class="orn orn-top"></div>

  <div class="section">
    <div class="title">RSVP & Ucapan</div>

    <h2>Konfirmasi Kehadiran</h2>
    <p style="margin-bottom:14px">
      Silakan isi konfirmasi & tuliskan ucapan terbaik untuk kami 🤎
    </p>

    <form id="formRsvp" class="rsvp-form">
      <input id="nama" type="text" placeholder="Nama Anda" required />

      <select id="hadir" required>
        <option value="">Pilih Kehadiran</option>
        <option value="Hadir">Hadir</option>
        <option value="Tidak Hadir">Tidak Hadir</option>
        <option value="InsyaAllah">InsyaAllah</option>
      </select>

      <textarea id="pesan" placeholder="Tulis ucapan / doa..." required></textarea>

      <button class="btn" type="submit">💌 Kirim Ucapan</button>
    </form>

    <div style="height:18px"></div>

    <h2 style="font-size:18px">Ucapan Masuk</h2>
    <div id="listUcapan" class="grid"></div>

    <div style="height:14px"></div>

    <p style="font-size:13px;color:rgba(255,246,229,.55)">
      Terima kasih atas doa dan kehadirannya 🙏
    </p>
  </div>

  <div class="orn orn-bottom"></div>
</div>
